events {}

http {
    server {
        listen 80;
        server_name airflow.gutdevapp.fr;

        location / {
            proxy_pass http://airflow-webserver:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    server {
        listen 80;
        server_name api.gutdevapp.fr;

        location / {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}