name: 'data_engineering_platform'
version: '1.0.0'
config-version: 2

profile: 'data_engineering_platform'

model-paths: ["models"]
test-paths: ["tests"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  data_engineering_platform:
    staging:
      +schema: staging
      +materialized: view        # staging = vues légères
    marts:
      +schema: marts
      +materialized: table       # marts = tables matérialisées