name: CI — dbt tests + lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  dbt-tests:
    name: dbt run & test
    runs-on: ubuntu-latest
    environment: prod

    permissions:
      id-token: write
      contents: read

    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_PROJECT_NUMBER: ${{ secrets.GCP_PROJECT_NUMBER }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install dbt-bigquery

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ env.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions-pool/providers/github
          service_account: github-actions-dbt@data-pipeline-490114.iam.gserviceaccount.com

      - name: dbt debug
        run: cd dbt_project && dbt debug

      - name: dbt run
        run: cd dbt_project && dbt run

      - name: dbt test
        run: cd dbt_project && dbt test

  lint:
    name: Python lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install ruff
      - run: ruff check dags/ api/ data_generator/