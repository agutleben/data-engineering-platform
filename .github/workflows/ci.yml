name: CI — dbt tests + lint + build + deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check dags/ api/ data_generator/

  dbt-tests:
    name: dbt run & test
    runs-on: ubuntu-latest
    needs: lint
    environment: prod
    permissions:
      id-token: write
      contents: read
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_PROJECT_NUMBER: ${{ secrets.GCP_PROJECT_NUMBER }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install dbt-bigquery
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ env.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions-pool/providers/github
          service_account: github-actions-dbt@data-pipeline-490114.iam.gserviceaccount.com
      - name: dbt debug
        run: cd dbt_project && dbt debug
      - name: dbt compile
        run: cd dbt_project && dbt compile

  build-push:
    name: Build & Push image
    runs-on: ubuntu-latest
    needs: dbt-tests
    if: github.ref == 'refs/heads/main'
    environment: prod
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/repo:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/repo:${{ github.sha }}

      - name: Build & Push Airflow
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.airflow
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/airflow:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/airflow:${{ github.sha }}

  deploy:
    name: Deploy VPS
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    environment: prod
    permissions:
      contents: read
    steps:                          # ← manquait
      - name: Deploy sur VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            systemctl stop nginx || true
            systemctl disable nginx || true

            if [ ! -d "/opt/data-engineering-platform" ]; then
              git clone https://github.com/agutleben/data-engineering-platform.git /opt/data-engineering-platform
            fi

            cd /opt/data-engineering-platform
            git pull origin main

            mkdir -p data_generator/output
            chmod -R 777 data_generator/output
            chmod -R 777 logs

            mkdir -p /opt/gcloud
            cat > /opt/gcloud/adc.json << 'EOFCREDS'
            ${{ secrets.GCP_SA_KEY }}
            EOFCREDS

            export GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            export GCP_DATASET_RAW=${{ vars.GCP_DATASET_RAW }}
            export GCP_DATASET_MARTS=${{ vars.GCP_DATASET_MARTS }}
            export API_KEY=${{ secrets.API_KEY }}
            export AIRFLOW_FERNET_KEY=${{ secrets.AIRFLOW_FERNET_KEY }}

            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

            docker compose -f docker-compose.prod.yml run --rm airflow-init || true
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            echo "Deploy terminé ✓"