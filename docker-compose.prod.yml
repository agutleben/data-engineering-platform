x-airflow-common: &airflow-common
  environment:
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
  image: gutdev/airflow:latest
  volumes:
    - /opt/gcloud/adc.json:/opt/airflow/adc.json:ro

services:
  api:
    image: gutdev/repo:latest
    volumes:
      - /opt/gcloud/adc.json:/app/adc.json:ro

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - airflow-webserver
    restart: always